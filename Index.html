<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 Snake Game - Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
        }
        #score {
            color: lime;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px lime;
        }
        canvas {
            border: 5px solid lime;
            background: #000;
            box-shadow: 0 0 20px lime;
        }
        #instructions {
            color: #666;
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="instructions">
        📱 Mobile: Swipe to move<br>
        ⌨️ Laptop: Arrow keys
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const grid = 20;
        const rows = canvas.height / grid;
        const cols = canvas.width / grid;

        let snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10}
        ];
        let food = {x: 15, y: 15};
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameOver = false;
        let changingDirection = false;

        const scoreElement = document.getElementById('score');

        function randomFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * cols),
                    y: Math.floor(Math.random() * rows)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            if (gameOver) {
                ctx.fillStyle = 'red';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
                ctx.font = '20px Arial';
                ctx.fillText('Score: ' + score, canvas.width/2, canvas.height/2 + 30);
                ctx.fillText('Refresh to play again', canvas.width/2, canvas.height/2 + 70);
                return;
            }

            changingDirection = false;

            // Create new head
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Wall collision
            if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
                gameOver = true;
                return;
            }

            // Self collision
            for (let segment of snake) {
                if (segment.x === head.x && segment.y === head.y) {
                    gameOver = true;
                    return;
                }
            }

            snake.unshift(head);

            // Eat food?
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = 'Score: ' + score;
                randomFood();
            } else {
                snake.pop();
            }

            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            ctx.fillStyle = 'lime';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x * grid, snake[i].y * grid, grid - 2, grid - 2);
            }

            // Draw food
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x * grid, food.y * grid, grid - 2, grid - 2);
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            if (changingDirection || gameOver) return;
            changingDirection = true;

            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            else if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            else if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
            else if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
        });

        // Mobile swipe controls
        let startX = 0, startY = 0;
        canvas.addEventListener('touchstart', e => {
            startX = e.changedTouches[0].screenX;
            startY = e.changedTouches[0].screenY;
        });

        canvas.addEventListener('touchend', e => {
            if (gameOver) return;
            const endX = e.changedTouches[0].screenX;
            const endY = e.changedTouches[0].screenY;
            const diffX = endX - startX;
            const diffY = endY - startY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx !== -1) { dx = 1; dy = 0; }
                else if (diffX < 0 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if (diffY > 0 && dy !== -1) { dx = 0; dy = 1; }
                else if (diffY < 0 && dy !== 1) { dx = 0; dy = -1; }
            }
        });

        // Start the game
        randomFood();
        setInterval(draw, 120);   // speed (lower = faster)
    </script>
</body>
</html>
